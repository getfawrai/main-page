  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

20-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"945e2063-b706-426b-84a7-c764897547de\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- Brand palette (exact, from Brand Book §05) ---------- */\n  --fawr-navy:      #0D2137;  /* Deep Navy — primary bg, headers, authority */\n  --fawr-charcoal:  #2C2C2C;  /* Body text. Never pure black */\n  --fawr-sage:      #8A9E85;  /* Sub-headers, wellness, warm support */\n  --fawr-gold:      #D4AF6E;  /* Accent / luxury signal. Use sparingly */\n  --fawr-offwhite:  #F8F5F0;  /* Page bg, card fills. Warmer than white */\n\n  /* ---------- Derived tints & shades (harmonised via oklch) ---------- */\n  --fawr-navy-90:   #1A3149;  /* hover on navy surfaces */\n  --fawr-navy-80:   #2A4560;  /* dividers on navy */\n  --fawr-sage-70:   #AEBDAB;  /* soft sage tint */\n  --fawr-sage-20:   #E6ECE4;  /* sage ghost bg */\n  --fawr-gold-90:   #C59F5D;  /* gold pressed */\n  --fawr-gold-20:   #F1E4CE;  /* gold ghost highlight */\n  --fawr-offwhite-2:#EFEAE1;  /* slightly deeper warm bg */\n  --fawr-line:      #E4DED2;  /* hairline rules on warm bg */\n  --fawr-line-dark: #1F3650;  /* hairline rules on navy */\n\n  /* ---------- Semantic foreground / background ---------- */\n  --fg-1: var(--fawr-charcoal);   /* primary body */\n  --fg-2: #5A5A5A;                /* secondary text */\n  --fg-3: #8A8A8A;                /* tertiary / captions */\n  --fg-on-navy:     var(--fawr-offwhite);\n  --fg-on-navy-dim: #9DB0C2;\n  --accent:         var(--fawr-gold);\n  --support:        var(--fawr-sage);\n\n  --bg-page:  var(--fawr-offwhite);\n  --bg-card:  #FFFFFF;\n  --bg-sunken:var(--fawr-offwhite-2);\n  --bg-navy:  var(--fawr-navy);\n\n  /* ---------- Status (derived, kept tonal to brand) ---------- */\n  --status-success: #6B8F6A;  /* deeper sage */\n  --status-warning: #C59F5D;  /* gold-90 */\n  --status-danger:  #B5554A;  /* terracotta, warm complement to navy */\n  --status-info:    #4A7A9E;  /* muted navy-blue */\n\n  /* ---------- Type families ---------- */\n  --font-display: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;\n  --font-body:    'Inter', 'Helvetica Neue', Arial, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* ---------- Type scale (digital — Brand Book §05) ---------- */\n  /* Montserrat headlines, Inter body. Never swap. */\n  --fs-display: 56px;\n  --fs-h1:      44px;\n  --fs-h2:      32px;\n  --fs-h3:      24px;\n  --fs-h4:      20px;\n  --fs-body-lg: 18px;\n  --fs-body:    16px;  /* Digital body 14–16px per Brand Book */\n  --fs-body-sm: 14px;\n  --fs-caption: 12px;\n\n  --lh-tight: 1.15;\n  --lh-snug:  1.3;\n  --lh-body:  1.55;  /* 1.5–1.6x per Brand Book */\n  --lh-loose: 1.7;\n\n  --tracking-display: -0.02em;\n  --tracking-heading: -0.01em;\n  --tracking-body:    0;\n  --tracking-eyebrow: 0.16em;  /* all-caps small labels */\n\n  /* ---------- Spacing (4px base) ---------- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* ---------- Radii — premium brand uses restrained rounding ---------- */\n  --radius-xs: 2px;\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-xl: 20px;\n  --radius-pill: 999px;\n\n  /* ---------- Elevation — soft, warm, low-contrast ---------- */\n  --shadow-xs: 0 1px 2px rgba(13, 33, 55, 0.04);\n  --shadow-sm: 0 2px 8px rgba(13, 33, 55, 0.06);\n  --shadow-md: 0 8px 24px rgba(13, 33, 55, 0.08);\n  --shadow-lg: 0 20px 48px rgba(13, 33, 55, 0.12);\n  --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.5);\n\n  /* ---------- Motion ---------- */\n  --ease-standard: cubic-bezier(0.2, 0.6, 0.2, 1);\n  --ease-emphasis: cubic-bezier(0.22, 0.9, 0.18, 1);\n  --dur-fast:   140ms;\n  --dur-base:   220ms;\n  --dur-slow:   360ms;\n}\n\n/* ============================================================\n   Semantic element styles\n   Writing feels premium, calm, sharp (Brand Book §04)\n   ============================================================ */\n\nbody {\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--fg-1);\n  background: var(--bg-page);\n  font-feature-settings: \"cv11\", \"ss01\", \"ss03\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  color: var(--fawr-navy);\n  letter-spacing: var(--tracking-heading);\n  line-height: var(--lh-tight);\n  font-weight: 700;\n  margin: 0;\n  text-wrap: balance;\n}\n\nh1 { font-size: var(--fs-h1); letter-spacing: var(--tracking-display); font-weight: 700; }\nh2 { font-size: var(--fs-h2); font-weight: 700; }\nh3 { font-size: var(--fs-h3); font-weight: 600; }\nh4 { font-size: var(--fs-h4); font-weight: 600; }\n\np {\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--fg-1);\n  margin: 0 0 var(--space-4);\n  text-wrap: pretty;\n  max-width: 64ch;\n}\n\nsmall, .caption {\n  font-size: var(--fs-caption);\n  color: var(--fg-3);\n  letter-spacing: 0.01em;\n}\n\n.eyebrow {\n  font-family: var(--font-body);\n  font-size: var(--fs-caption);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-eyebrow);\n  font-weight: 600;\n  color: var(--fawr-sage);\n}\n\n.display {\n  font-family: var(--font-display);\n  font-size: var(--fs-display);\n  font-weight: 700;\n  letter-spacing: var(--tracking-display);\n  line-height: var(--lh-tight);\n  color: var(--fawr-navy);\n}\n\ncode, pre, .mono {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\na {\n  color: var(--fawr-navy);\n  text-decoration-color: var(--fawr-gold);\n  text-decoration-thickness: 1.5px;\n  text-underline-offset: 3px;\n  transition: color var(--dur-fast) var(--ease-standard);\n}\na:hover { color: var(--fawr-gold); }\n\nhr {\n  border: 0;\n  height: 1px;\n  background: var(--fawr-line);\n  margin: var(--space-6) 0;\n}\n\n/* A tiny gold divider — used as a \"section anchor\" in editorial layouts */\n.gold-rule {\n  width: 48px;\n  height: 2px;\n  background: var(--fawr-gold);\n  border: 0;\n  margin: 0;\n}\n\n::selection {\n  background: var(--fawr-gold);\n  color: var(--fawr-navy);\n}\n\n/* ============================================================\n   Marketing-site mobile responsive overrides\n   Breakpoints: <=900px (tablet), <=640px (phone)\n   ============================================================ */\n\n@media (max-width: 900px) {\n  /* Section padding */\n  .fw-section { padding: 56px 28px !important; }\n  .fw-hero { padding: 48px 28px 64px !important; }\n  .fw-book { padding: 48px 28px !important; }\n\n  /* Nav */\n  .fw-nav { padding: 14px 20px !important; gap: 12px !important; }\n  .fw-nav-links { display: none !important; }\n  .fw-nav-cta { display: none !important; }\n  .fw-nav-burger { display: inline-flex !important; }\n\n  /* Grids collapse to single column */\n  .fw-grid-3 { grid-template-columns: 1fr !important; gap: 32px !important; }\n  .fw-book-grid { grid-template-columns: 1fr !important; gap: 32px !important; }\n  .fw-footer-grid { gap: 32px !important; padding-bottom: 28px !important; }\n  .fw-footer { padding: 40px 28px 24px !important; }\n  .fw-footer-baseline { flex-direction: column !important; align-items: flex-start !important; }\n\n  /* Differentiator table stacks */\n  .fw-diff-table .fw-diff-head { display: none !important; }\n  .fw-diff-table .fw-diff-row { grid-template-columns: 1fr !important; }\n  .fw-diff-table .fw-diff-row > div { border-left: none !important; padding: 14px 18px !important; font-size: 14px !important; }\n  .fw-diff-table .fw-diff-row > div:first-child { border-top: 1px solid var(--fawr-line); padding-top: 16px !important; }\n  .fw-diff-table .fw-diff-row > div:last-child { padding-bottom: 16px !important; opacity: 0.75; }\n\n  /* Type scale — shrink all the big inline font-sizes */\n  .fw-section h1, .fw-section h2 { font-size: clamp(26px, 7vw, 36px) !important; line-height: 1.18 !important; letter-spacing: -0.015em !important; }\n  .fw-hero h1 { font-size: clamp(32px, 8.5vw, 44px) !important; line-height: 1.1 !important; }\n  .fw-section p, .fw-section blockquote { font-size: 15px !important; line-height: 1.6 !important; }\n  .fw-hero p { font-size: 16px !important; }\n  .fw-testimonial blockquote { font-size: 20px !important; line-height: 1.4 !important; }\n\n  /* Huge stat numbers */\n  .fw-proof .fw-grid-3 > div > div:first-child { font-size: 54px !important; }\n  .fw-hero .eyebrow, .fw-section .eyebrow { font-size: 11px !important; }\n  .fw-hero > div > div:last-child { flex-wrap: wrap !important; gap: 14px 24px !important; margin-top: 48px !important; }\n\n  /* Buttons stretch to usable size */\n  .fw-section button { font-size: 15px !important; padding: 14px 22px !important; }\n}\n\n@media (max-width: 480px) {\n  .fw-section { padding: 44px 22px !important; }\n  .fw-hero { padding: 40px 22px 52px !important; }\n  .fw-hero h1 { font-size: clamp(28px, 9vw, 38px) !important; }\n  .fw-section h1, .fw-section h2 { font-size: clamp(24px, 8vw, 30px) !important; }\n  .fw-proof .fw-grid-3 > div > div:first-child { font-size: 46px !important; }\n  .fw-testimonial blockquote { font-size: 18px !important; }\n}\n<\u002Fstyle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"43f72f79-b007-474c-92ab-9b9d730ee089\") format('woff2');\n  unicode-range: U+0 4c-92ab-9b9d730ee089\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"2e176c95-d883-4850-8cc7-1567d46a6704\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"2efb250d-82a4-4c80-84c8-ef98b262f297\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"421a2677-231f-4681-9c20-9655bd2c789e\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"50f8c9b4-b9ad-48ec-821e-862b63d8f055\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"284b5ef9-941c-44a1-b1ac-b4ceddd7cca4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root {\n  /* Strictly brand-book palette */\n  --hero-bg:        #F8F5F0;   /* brand off-white */\n  --hero-bg-2:      #EFEAE1;   /* brand off-white-2 (already in your tokens) */\n  --ink:            #0D2137;   /* brand navy */\n  --ink-2:          #2C2C2C;   /* brand charcoal */\n  --ink-dim:        rgba(13,33,55,0.55);\n  --sage:           #8A9E85;   /* brand sage */\n  --sage-ink:       #5E7558;   /* darker shade of brand sage — readable for body/eyebrow */\n  --sage-soft:      #E6ECE4;   /* brand sage-20 */\n  --gold:           #D4AF6E;   /* brand gold — accent only */\n  --card-dark:      #0D2137;   /* navy preview/CTA */\n  --card-stroke:    rgba(255,255,255,0.07);\n  --on-dark:        #F8F5F0;\n  --on-dark-dim:    #9DB0C2;\n  --line:           #E4DED2;   /* brand warm line */\n}\n\n* { box-sizing: border-box; }\nhtml, body {\n  margin: 0; padding: 0;\n  background: var(--hero-bg);\n  color: var(--ink);\n  font-family: 'Inter', system-ui, sans-serif;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ===== NAV ===== */\n.nav {\n  position: sticky; top: 0; z-index: 30;\n  display: flex; align-items: center; gap: 32px;\n  padding: 22px 40px;\n  background: transparent;\n  transition: background 220ms ease, border-color 220ms;\n  border-bottom: 1px solid transparent;\n}\n.nav.scrolled {\n  background: rgba(248, 245, 240, 0.85);\n  backdrop-filter: blur(20px);\n  border-bottom-color: rgba(13,33,55,0.06);\n}\n.nav .logo img { height: 26px; width: auto; display: block; }\n.nav .links { display: flex; gap: 30px; margin-left: auto; align-items: center; }\n.nav .links a {\n  font-size: 13.5px; font-weight: 500;\n  color: var(--ink); text-decoration: none;\n  transition: color 140ms;\n}\n.nav .links a:hover { color: var(--sage-ink); }\n.nav .cta {\n  font-size: 13.5px; font-weight: 600;\n  background: var(--ink);\n  color: var(--hero-bg);\n  padding: 11px 20px;\n  border-radius: 999px;\n  text-decoration: none;\n  transition: background 220ms;\n}\n.nav .cta:hover { background: var(--sage-ink); }\n.nav .burger {\n  display: none;\n  margin-left: auto;\n  width: 40px; height: 40px;\n  background: transparent;\n  border: none;\n  padding: 0; cursor: pointer;\n  align-items: center; justify-content: center;\n}\n.nav .burger span {\n  display: block;\n  width: 22px; height: 1.5px;\n  background: var(--ink);\n  position: relative;\n}\n.nav .burger span::before,\n.nav .burger span::after {\n  content: ''; position: absolute; left: 0; right: 0; height: 1.5px; background: var(--ink);\n}\n.nav .burger span::before { top: -6px; }\n.nav .burger span::after  { top: 6px; }\n\n/* ===== HERO ===== */\n.hero {\n  display: block;\n  padding: 56px 40px 120px;\n  max-width: 1100px;\n  margin: 0 auto;\n}\n\n.hero-left { padding-top: 36px; max-width: 880px; }\n\n.pill-sage {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 11px; font-weight: 500;\n  letter-spacing: 0.2em; text-transform: uppercase;\n  color: var(--sage-ink);\n  padding: 6px 14px;\n  border: 1px solid var(--sage-soft);\n  background: rgba(199, 212, 192, 0.22);\n  border-radius: 999px;\n  display: inline-block;\n  margin-bottom: 36px;\n}\n\nh1.hero-title {\n  font-family: 'Montserrat', sans-serif;\n  font-optical-sizing: auto;\n  font-weight: 400;\n  font-size: clamp(54px, 6.4vw, 96px);\n  line-height: 1.02;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n  margin: 0;\n  max-width: 16ch;\n  text-wrap: pretty;\n}\nh1.hero-title .line2 {\n  display: block;\n  font-style: italic;\n  font-weight: 300;\n  color: var(--sage-ink);\n}\n\n.sub-eye {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 12px; font-weight: 500;\n  letter-spacing: 0.2em; text-transform: uppercase;\n  color: var(--sage-ink);\n  margin: 40px 0 18px;\n}\n\n.lede {\n  font-size: 18px; font-weight: 400;\n  line-height: 1.55;\n  color: var(--ink-2);\n  max-width: 56ch;\n  margin: 0 0 32px;\n}\n.lede .chip-inline {\n  display: inline-block;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 13px;\n  background: rgba(199, 212, 192, 0.35);\n  color: var(--sage-ink);\n  padding: 3px 10px;\n  border-radius: 999px;\n  margin: 0 2px;\n  letter-spacing: 0;\n  text-transform: none;\n  font-weight: 500;\n  white-space: nowrap;\n}\n\n.hero-cta-row {\n  display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px;\n}\n.btn-dark {\n  font-size: 14px; font-weight: 600;\n  background: var(--ink);\n  color: var(--hero-bg);\n  border: none;\n  padding: 14px 24px;\n  border-radius: 999px;\n  cursor: pointer;\n  text-decoration: none;\n  display: inline-flex; align-items: center; gap: 8px;\n  transition: background 220ms;\n}\n.btn-dark:hover { background: var(--sage-ink); }\n.btn-ghost {\n  font-size: 14px; font-weight: 500;\n  background: transparent;\n  color: var(--ink);\n  border: 1px solid rgba(13,33,55,0.18);\n  padding: 14px 24px;\n  border-radius: 999px;\n  cursor: pointer;\n  text-decoration: none;\n  display: inline-flex; align-items: center; gap: 8px;\n  transition: border-color 220ms;\n}\n.btn-ghost:hover { border-color: var(--ink); }\n\n/* ===== RIGHT-RAIL PREVIEW CARD ===== */\n.preview-card {\n  background: var(--card-dark);\n  border-radius: 28px;\n  padding: 32px 32px 28px;\n  color: var(--on-dark);\n  border: 1px solid var(--card-stroke);\n  position: relative;\n  align-self: start;\n  margin-top: 60px;\n}\n.preview-card .head {\n  display: flex; align-items: center; gap: 10px;\n  margin-bottom: 28px;\n}\n.preview-card .head .dot {\n  width: 8px; height: 8px; border-radius: 99px;\n  background: var(--gold);\n  box-shadow: 0 0 12px rgba(212,175,110,0.55);\n}\n.preview-card .head .label {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;\n  color: var(--on-dark-dim);\n}\n.sample {\n  background: rgba(255,255,255,0.03);\n  border: 1px solid var(--card-stroke);\n  border-radius: 20px;\n  padding: 22px 24px 20px;\n  margin-bottom: 14px;\n}\n.sample:last-child { margin-bottom: 0; }\n.sample .num {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;\n  color: var(--on-dark-dim);\n  margin-bottom: 10px;\n}\n.sample .text {\n  font-size: 16px; line-height: 1.5;\n  color: var(--on-dark);\n  margin: 0;\n  max-width: 38ch;\n}\n\n/* ===== HOW IT WORKS ===== */\nsection.how {\n  background: var(--hero-bg-2);\n  padding: 120px 40px;\n  border-top: 1px solid rgba(13,33,55,0.06);\n}\nsection.how .wrap { max-width: 1320px; margin: 0 auto; }\nsection.how .eye {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 12px; font-weight: 500;\n  letter-spacing: 0.22em; text-transform: uppercase;\n  color: var(--sage-ink);\n  margin-bottom: 18px;\n}\nsection.how h2 {\n  font-family: 'Montserrat', sans-serif;\n  font-weight: 400;\n  font-size: clamp(40px, 5vw, 64px);\n  line-height: 1.05;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  margin: 0 0 64px;\n  max-width: 24ch;\n  text-wrap: balance;\n}\nsection.how h2 em { font-style: italic; font-weight: 300; color: var(--sage-ink); }\n\n.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }\n.step {\n  border-top: 1px solid rgba(13,33,55,0.16);\n  padding-top: 28px;\n}\n.step .n {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 12px; font-weight: 500;\n  letter-spacing: 0.22em; text-transform: uppercase;\n  color: var(--sage-ink);\n  margin-bottom: 12px;\n}\n.step h4 {\n  font-family: 'Montserrat', sans-serif;\n  font-weight: 400;\n  font-size: 26px;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n  margin: 0 0 12px;\n  max-width: 18ch;\n}\n.step p {\n  font-size: 14.5px;\n  line-height: 1.6;\n  color: var(--ink-2);\n  margin: 0;\n  max-width: 38ch;\n}\n\n/* ===== DIFF (what FawrAI is / is not) ===== */\nsection.diff {\n  padding: 120px 40px;\n  background: var(--hero-bg);\n}\nsection.diff .wrap { max-width: 1100px; margin: 0 auto; }\nsection.diff .eye {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 12px; font-weight: 500;\n  letter-spacing: 0.22em; text-transform: uppercase;\n  color: var(--sage-ink);\n  margin-bottom: 18px;\n}\nsection.diff h2 {\n  font-family: 'Montserrat', sans-serif;\n  font-weight: 400;\n  font-size: clamp(36px, 4.4vw, 56px);\n  line-height: 1.06;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  margin: 0 0 48px;\n  max-width: 22ch;\n  text-wrap: balance;\n}\nsection.diff h2 em { font-style: italic; font-weight: 300; color: var(--sage-ink); }\n.diff-table {\n  border: 1px solid rgba(13,33,55,0.1);\n  border-radius: 24px;\n  overflow: hidden;\n  background: rgba(255,255,255,0.5);\n}\n.diff-table .row {\n  display: grid; grid-template-columns: 1fr 1fr;\n  border-bottom: 1px solid rgba(13,33,55,0.08);\n}\n.diff-table .row:last-child { border-bottom: 0; }\n.diff-table .row > div {\n  padding: 22px 28px;\n  font-size: 16px;\n  line-height: 1.45;\n}\n.diff-table .row > div:first-child {\n  color: var(--ink);\n  font-weight: 500;\n}\n.diff-table .row > div:last-child {\n  color: var(--ink-dim);\n  border-left: 1px solid rgba(13,33,55,0.08);\n  text-decoration: line-through;\n  text-decoration-color: rgba(13,33,55,0.25);\n}\n.diff-table .head {\n  background: rgba(199, 212, 192, 0.28);\n}\n.diff-table .head > div {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 11px; font-weight: 500;\n  letter-spacing: 0.22em; text-transform: uppercase;\n  color: var(--sage-ink);\n  text-decoration: none;\n}\n.diff-table .head > div:last-child { color: var(--ink-dim); }\n\n/* ===== BOTTOM CTA ===== */\nsection.bottom-cta {\n  background: var(--hero-bg);\n  padding: 88px 40px 100px;\n  border-top: 1px solid rgba(13,33,55,0.06);\n}\nsection.bottom-cta .wrap {\n  max-width: 1100px; margin: 0 auto;\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 32px; flex-wrap: wrap;\n}\nsection.bottom-cta h3 {\n  font-family: 'Montserrat', sans-serif;\n  font-weight: 400;\n  font-size: clamp(28px, 3.4vw, 40px);\n  line-height: 1.1;\n  letter-spacing: -0.015em;\n  color: var(--ink);\n  margin: 0;\n  max-width: 18ch;\n  text-wrap: balance;\n}\n\n/* ===== MOBILE DRAWER (slides in from the right) ===== */\n.drawer {\n  position: fixed;\n  top: 0; right: 0; bottom: 0;\n  width: min(78vw, 320px);\n  background: var(--ink);\n  color: var(--hero-bg);\n  padding: 80px 28px 32px;\n  z-index: 25;\n  transform: translateX(110%);\n  transition: transform 260ms cubic-bezier(.2,.6,.2,1);\n  display: flex; flex-direction: column;\n  gap: 0;\n  box-shadow: -8px 0 32px rgba(13,33,55,0.18);\n}\n.drawer.open { transform: translateX(0); }\n.drawer a {\n  font-family: 'Montserrat', sans-serif;\n  font-weight: 600;\n  font-size: 20px;\n  letter-spacing: -0.005em;\n  color: var(--hero-bg);\n  padding: 16px 0;\n  border-bottom: 1px solid rgba(255,255,255,0.1);\n  text-decoration: none;\n}\n.drawer a:last-child { border-bottom: 0; }\n\n/* Scrim behind the drawer */\n.scrim {\n  position: fixed; inset: 0;\n  background: rgba(13,33,55,0.35);\n  z-index: 24;\n  opacity: 0;\n  pointer-events: none;\n  transition: opacity 220ms;\n}\n.scrim.open { opacity: 1; pointer-events: auto; }\n\n/* ===== BOOK FORM ===== */\nsection.book {\n  background: var(--hero-bg-2);\n  padding: 96px 40px 120px;\n  border-top: 1px solid rgba(13,33,55,0.06);\n}\nsection.book .wrap {\n  max-width: 1100px; margin: 0 auto;\n  display: grid; grid-template-columns: 1fr 1fr; gap: 64px;\n  align-items: start;\n}\nsection.book .intro { padding-top: 12px; }\nsection.book h2.book-title {\n  font-family: 'Montserrat', sans-serif;\n  font-weight: 400;\n  font-size: clamp(34px, 3.8vw, 48px);\n  line-height: 1.08;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  margin: 24px 0 0;\n  max-width: 14ch;\n  text-wrap: pretty;\n}\nsection.book h2.book-title em { font-style: italic; font-weight: 300; color: var(--sage-ink); }\nsection.book form {\n  background: #fff;\n  border: 1px solid rgba(13,33,55,0.08);\n  border-radius: 24px;\n  padding: 36px 32px;\n  box-shadow: 0 8px 28px rgba(13,33,55,0.04);\n}\nsection.book l
